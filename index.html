<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vorld.net — 3D Model</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      font-family: 'Courier New', monospace;
      color: #e0e0e0;
      overflow: hidden;
    }

    #canvas-container {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    canvas { display: block; }

    /* HUD overlay */
    #hud {
      position: absolute;
      top: 24px;
      left: 28px;
      pointer-events: none;
    }

    #hud h1 {
      font-size: 13px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #7df3c0;
      margin-bottom: 4px;
    }

    #hud p {
      font-size: 11px;
      color: #666;
      letter-spacing: 0.1em;
    }

    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 12px;
      letter-spacing: 0.3em;
      color: #7df3c0;
      text-transform: uppercase;
      animation: pulse 1.4s ease-in-out infinite;
    }

    #menu-btn{
  position:absolute;
  top:20px;
  right:20px;
  z-index:999;

  width:50px;
  height:50px;

  border:none;
  border-radius:12px;

  background:rgba(0,0,0,.6);
  color:#7df3c0;
  font-size:24px;
  cursor:pointer;
}

#menu-panel{
  position:absolute;
  top:80px;
  right:20px;

  width:220px;

  background:#111;
  border:1px solid #333;
  border-radius:12px;

  padding:15px;

  display:none;

  z-index:999;
}

#menu-panel.active{
  display:block;
}

#menu-panel button{
  width:100%;
  margin-top:10px;
  padding:10px;
}

#mobile-controls{
  position:absolute;
  bottom:30px;
  left:30px;

  z-index:999;
}

#move-pad{
  width:160px;
  height:160px;
  position:relative;
}

#move-pad button{
  position:absolute;

  width:50px;
  height:50px;

  border:none;
  border-radius:50%;

  background:rgba(0,0,0,.6);
  color:#7df3c0;
  font-size:22px;
}

#forward{
  top:0;
  left:55px;
}

#back{
  bottom:0;
  left:55px;
}

#left{
  top:55px;
  left:0;
}

#right{
  top:55px;
  right:0;
}

@media(min-width:768px){
  #mobile-controls{
    display:none;
  }
}

    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50%       { opacity: 1; }
    }
  </style>
</head>
<body>
  <button id="menu-btn">☰</button>

  <div id="mobile-controls">

  <div id="move-pad">
    <button id="forward">▲</button>
    <button id="left">◀</button>
    <button id="right">▶</button>
    <button id="back">▼</button>
  </div>

</div>

<div id="menu-panel">
  <h3>Vorld Menu</h3>

  <button id="toggle-grid">
    Toggle Grid
  </button>

  <button id="reset-camera">
    Reset Camera
  </button>
</div>


  <div id="canvas-container">
    <div id="hud">
      <h1>vorld.net</h1>
      <p>drag to orbit · scroll to zoom</p>
    </div>
    <div id="loading" id="loading">Loading model…</div>
  </div>

  <!-- Three.js r128 from CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <!-- GLTFLoader (r128 compatible) -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

  <!-- OrbitControls -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

  <script src="main.js"></script>
</body>
</html>
